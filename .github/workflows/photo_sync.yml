name: Photo Sync (Snipe-IT → OneDrive)

on:
  schedule:
    # Nightly at 07:00 UTC (~02:00 CT). Adjust as needed.
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force re-upload everything (ignore dedupe DB)"
        required: false
        default: "false"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        working-directory: photo_sync
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore dedupe DB
        uses: actions/cache@v4
        with:
          path: photo_sync/photo_sync_state.db
          key: photo-sync-db-${{ github.run_id }}
          restore-keys: |
            photo-sync-db-

      - name: Run sync
        working-directory: photo_sync
        env:
          SNIPE_URL: ${{ secrets.SNIPE_URL }}
          SNIPE_API_KEY: ${{ secrets.SNIPE_API_KEY }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ONEDRIVE_USER_ID: ${{ secrets.ONEDRIVE_USER_ID }}
          ONEDRIVE_DRIVE_ID: ${{ secrets.ONEDRIVE_DRIVE_ID }}
          ONEDRIVE_BASE_FOLDER: ${{ vars.ONEDRIVE_BASE_FOLDER || 'AssetPhotos' }}
          WRITE_BACK_TO_SNIPEIT: ${{ vars.WRITE_BACK_TO_SNIPEIT || 'false' }}
          FORCE_RESYNC: ${{ github.event.inputs.force || 'false' }}
          LOG_LEVEL: INFO
        run: python sync.py

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: photo-sync-state
          path: photo_sync/photo_sync_state.db
          if-no-files-found: ignore
          retention-days: 30
