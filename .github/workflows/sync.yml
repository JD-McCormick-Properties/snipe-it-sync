name: Property Sync

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync
        env:
          SNIPE_URL: ${{ secrets.SNIPE_URL }}
          SNIPE_API_KEY: ${{ secrets.SNIPE_API_KEY }}
        run: python sync_properties.py
